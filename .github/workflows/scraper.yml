name: Actualizar Cotizaciones

on:
  schedule:
    - cron: '0 * * * 1-5'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Clonar el repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Instalar dependencias
        run: npm install

      - name: Ejecutar el Scraping
        run: node scraper.js

      - name: Guardar cambios y subirlos a GitHub
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add cotizaciones.json
          # Con esta línea corregida, si no hay cotizaciones nuevas, el bot no colapsará
          git commit -m "Bot: Cotizaciones actualizadas automáticamente" || echo "Sin cambios en el mercado"
          git push || echo "Repositorio ya actualizado"
